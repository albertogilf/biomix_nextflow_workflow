name: Test Nextflow Workflow

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Miniforge
        shell: bash
        run: |
          curl -L --fail --retry 3 \
            -o "$RUNNER_TEMP/miniforge.sh" \
            "https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh"
          bash "$RUNNER_TEMP/miniforge.sh" -b -p "$HOME/miniforge3"
          "$HOME/miniforge3/bin/conda" config --set always_yes yes --set changeps1 no
          echo "$HOME/miniforge3/bin" >> "$GITHUB_PATH"

      - name: Create Nextflow environment
        shell: bash -el {0}
        run: |
          source "$HOME/miniforge3/etc/profile.d/conda.sh"
          conda env create -n nextflow -f test/test_environment.yml

      - name: Test workflow
        shell: bash -el {0}
        run: |
          source "$HOME/miniforge3/etc/profile.d/conda.sh"
          conda activate nextflow
          make run
